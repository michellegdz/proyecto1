<!doctype html>

<html lang="es">
  <head>
    <title>Document</title>
    <!--Aquí van los metadatos-->
    <!--La forma fácil de incluir comentarios es con Ctr + ç-->
    <title>HTML básico</title>
    <meta charset="utf-8" />
    <link href="img/favicon.ico" rel="icon" type="image/ico" />
  </head>
  <body>
    <!--Aquí va el contenido de la página-->
    <header>
      <h1>Descubre Salamanca</h1>
    </header>
    <nav>
      <ul>
        <li>
          <a href="#">La ciudad</a>
        </li>
        <li>
          <a href="#">Propuestas especiales</a>
        </li>
        <li>
          <a href="#">Transportes</a>
        </li>
      </ul>
    </nav>

    <section>
      <h2>La ciudad</h2>
      <!--Contenedor con el contenido de la sección-->
      <div>
        <!--Contenedor con los dos párrafos-->
        <div>
          <p>Párrafo 1</p>
          <p>Párrafo 2</p>
        </div>
        <figure>
          <img src="img/15825342581.jpg" alt="Huerto de Calisto y Melibea" />
        </figure>
      </div>
    </section>

    <section>
      <h2>Propuestas especiales</h2>
      <!--Galería de imagenes-->
      <div>
        <!--Cada una de las imagenes está metida en un figure-->
        <figure>
          <img src="img/planes1.jpg" alt="" />
          <figcaption>
            <a
              href="https://www.civitatis.com/es/salamanca/tour-salamanca-completo/?aid=104&cmp=es_ES_Nonbrand&cmpint=_ActividadesES_Salamanca_DSA&=&gad_campaignid=9022921678"
              target="_blank"
              title="Se abre en otra ventana"
            >
              Salamanca en dos y tres días
            </a>
          </figcaption>
        </figure>
        <figure>
          <img src="img/planes2.jpg" alt="" />
          <figcaption>
            <a
              href="https://www.civitatis.com/es/salamanca/tour-salamanca-completo/?aid=104&cmp=es_ES_Nonbrand&cmpint=_ActividadesES_Salamanca_DSA&=&gad_campaignid=9022921678"
              target="_blank"
              title="Se abre en otra ventana"
            >
              Salamanca en dos y tres días
            </a>
          </figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Transportes</h2>
      <p>Párrafo de transportes</p>
      <div>
        <figure>
          <img src="img/ALSA_2019_logo.svg.png" alt="Logotipo de ALSA" />
        </figure>
        <figure>
          <img src="img/logo-vector-avanza-grupo.1.png" alt="Grupo AVANZA" />
        </figure>
      </div>
    </section>
  </body>
</html>
